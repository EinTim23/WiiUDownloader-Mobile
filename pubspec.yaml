name: wiiudownloader
description: "Download your Wii U Games on mobile."
publish_to: 'none'
version: 0.2.0+1

environment:
  sdk: ^3.11.1

dependencies:
  ffi: ^2.1.0
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  flutter_foreground_task: ^9.2.2
  flutter_local_notifications: ^21.0.0
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.5
  wakelock_plus: ^1.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
